\* Use INIT/NEXT directly because the original Spec adds per-actor
\* WF fairness which Apalache does not handle.
\* `TypeOK` references `Seq({"read","write"} \X Actors)` (an unbounded
\* set) which Apalache cannot enumerate; we only check `Safety` here.

CONSTANT NumActors = 3

INIT Init
NEXT Next

INVARIANT Safety
