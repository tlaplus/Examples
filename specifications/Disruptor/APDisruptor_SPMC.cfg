\* Use INIT/NEXT directly because the original Spec adds per-reader
\* WF fairness which Apalache does not handle.
\* `TypeOk` references `Seq(Nat)` (an unbounded set) which Apalache cannot
\* enumerate, so we only check `NoDataRaces` here.

CONSTANTS
  MaxPublished = 4
  Writers <- WritersVal
  Readers <- ReadersVal
  Size = 4
  NULL = -1

INIT Init
NEXT Next

INVARIANT NoDataRaces
