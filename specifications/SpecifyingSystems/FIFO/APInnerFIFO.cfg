\* The original `TypeInvariant` references `Seq(Message)` which Apalache
\* cannot enumerate; we omit it from the cfg but still drive the checker
\* against the channel invariants of the inner Channel modules via
\* `InChan!TypeInvariant` / `OutChan!TypeInvariant`. Those access only
\* the record-typed channels and stay within Apalache's fragment.

CONSTANT
  Message <- MessageVal

INVARIANT ChannelTypeInvariants

SPECIFICATION Spec
